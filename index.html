<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Importateur RPV</title>
    <style>
        body {
            font-family: "Montserrat", sans-serif;
            background-color: #F5F4EE; /* Crème RPV */
            color: #3B3B3B;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(31, 77, 46, 0.1);
            padding: 30px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            border: 1px solid #E8E5D9;
        }
        h2 { margin-top: 0; color: #1F4D2E; font-size: 24px; font-weight: 700; }
        p.subtitle { color: #666; font-size: 14px; margin-bottom: 25px; }
        
        .auth-form {
            background-color: #E8F5E9;
            border: 1px solid #C8E6C9;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: left;
        }
        .auth-form label { display: block; font-size: 12px; font-weight: bold; color: #1F4D2E; margin-bottom: 5px; }
        .auth-form input { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #A5D6A7; border-radius: 4px; box-sizing: border-box; }
        
        .btn-submit {
            background-color: #2E7D32;
            color: white;
            border: none;
            padding: 12px 15px;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s;
        }
        .btn-submit:hover { background-color: #1F4D2E; }

        .drop-zone {
            border: 2px dashed #2E7D32;
            border-radius: 8px;
            padding: 40px 20px;
            background-color: #FAFAFA;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
            opacity: 0.5;
            pointer-events: none;
        }
        .drop-zone.active { opacity: 1; pointer-events: auto; background-color: #E8F5E9; }
        .drop-zone p { margin: 0; color: #1F4D2E; font-weight: 600; }
        
        .status-box { padding: 15px; border-radius: 6px; font-size: 13px; margin-top: 15px; display: none; text-align: left; }
        .status-success { background-color: #E8F5E9; color: #1F4D2E; border-left: 5px solid #2E7D32; }
        .status-error { background-color: #FFEBEE; color: #C62828; border-left: 5px solid #C62828; }
        
        .loader { display: inline-block; width: 15px; height: 15px; border: 2px solid #E8F5E9; border-top-color: #2E7D32; border-radius: 50%; animation: spin 1s infinite; margin-right: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <h2>Importateur RPV</h2>
    <p class="subtitle">Gestion des traces communales</p>

    <div class="auth-form" id="authForm">
        <label>Portail ArcGIS</label>
        <input type="text" id="portalUrl" value="https://cartoasp.maps.arcgis.com">
        <label>Identifiant</label>
        <input type="text" id="username" value="yoann.gerard8">
        <label>Mot de passe</label>
        <input type="password" id="password" placeholder="••••••••">
        <button class="btn-submit" onclick="genererTokenDirect()">Se connecter</button>
    </div>

    <div class="drop-zone" id="dropZone">
        <p>Glissez-déposez le fichier de trace</p>
    </div>
    <input type="file" id="fileInput" style="display:none">
    <div id="statusBox" class="status-box"></div>
</div>

<script>
    const NOM_DU_REFERENTIEL = "RPV_StMartinSteCatherine_v1";
    let agolToken, featureServiceUrl, portalUrl;

    async function genererTokenDirect() {
        const portalInput = document.getElementById('portalUrl').value.trim();
        const usernameInput = document.getElementById('username').value.trim();
        const passwordInput = document.getElementById('password').value;
        showStatus(`<div class="loader"></div>Authentification en cours...`, "info");
        portalUrl = portalInput.replace(/\/$/, ""); 
        try {
            const params = new URLSearchParams({ "username": usernameInput, "password": passwordInput, "client": "referer", "referer": window.location.origin, "expiration": "120", "f": "json" });
            const response = await fetch(`${portalUrl}/sharing/rest/generateToken`, { method: "POST", headers: { "Content-Type": "application/x-www-form-urlencoded" }, body: params });
            const data = await response.json();
            if (data.token) {
                agolToken = data.token;
                document.getElementById('authForm').style.display = "none";
                rechercherIDEtServiceParNom();
            } else { showStatus("Erreur d'authentification.", "error"); }
        } catch (e) { showStatus("Erreur de connexion.", "error"); }
    }

    async function rechercherIDEtServiceParNom() {
        const queryUrl = `${portalUrl}/sharing/rest/search?q=title:"${encodeURIComponent(NOM_DU_REFERENTIEL)}" AND type:"Feature Service"&f=json&token=${agolToken}`;
        const searchData = await (await fetch(queryUrl)).json();
        if (searchData.results?.length > 0) {
            featureServiceUrl = `${searchData.results[0].url}/0`;
            document.getElementById('dropZone').classList.add('active'); 
            showStatus("Connecté au RPV. Prêt pour l'import.", "success");
        } else { showStatus("Couche introuvable.", "error"); }
    }

    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    dropZone.onclick = () => fileInput.click();
    dropZone.ondragover = (e) => e.preventDefault();
    dropZone.ondrop = (e) => { e.preventDefault(); handleFile(e.dataTransfer.files[0]); };
    fileInput.onchange = (e) => handleFile(e.target.files[0]);

    function handleFile(file) {
        showStatus(`<div class="loader"></div>Traitement...`, "info");
        const reader = new FileReader();
        reader.onload = async function(e) {
            try {
                const points = new DOMParser().parseFromString(e.target.result, "text/xml").getElementsByTagName("trkpt");
                if (points.length === 0) throw new Error("Fichier invalide ou vide.");
                let coordsWGS84 = [], distance = 0;
                for (let i = 0; i < points.length; i++) {
                    const pt = [parseFloat(points[i].getAttribute("lon")), parseFloat(points[i].getAttribute("lat"))];
                    coordsWGS84.push(pt);
                    if (i > 0) distance += calculerHaversine(coordsWGS84[i-1][0], coordsWGS84[i-1][1], pt[0], pt[1]);
                }
                insererTraceAGOL(file.name, [coordsWGS84.map(pt => wgs84ToWebMercator(pt[0], pt[1]))], Math.round((distance/1000)*1000)/1000);
            } catch (err) { showStatus("Erreur : " + err.message, "error"); }
        };
        reader.readAsText(file);
    }

    function wgs84ToWebMercator(lon, lat) {
        const x = lon * 20037508.34 / 180.0;
        let y = Math.log(Math.tan((90.0 + Math.max(Math.min(lat, 85.05112878), -85.05112878)) * Math.PI / 360.0)) / (Math.PI / 180.0);
        return [x, y * 20037508.34 / 180.0];
    }

    function calculerHaversine(lon1, lat1, lon2, lat2) {
        const R = 6371000;
        const dPhi = (lat2-lat1)*Math.PI/180, dLambda = (lon2-lon1)*Math.PI/180;
        const a = Math.sin(dPhi/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLambda/2)**2;
        return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
    }

    async function insererTraceAGOL(fileName, paths, distance) {
        const features = [{ "geometry": { "paths": paths, "spatialReference": {"wkid": 102100} }, "attributes": { "nom": fileName, "pratique": "Pedestre", "distance_2d_km": distance, "statut_traitement": "a_traiter" } }];
        const bodyData = new URLSearchParams({ "features": JSON.stringify(features), "f": "json", "token": agolToken });
        const res = await (await fetch(`${featureServiceUrl}/addFeatures`, { method: "POST", headers: { "Content-Type": "application/x-www-form-urlencoded" }, body: bodyData })).json();
        if (res.addResults?.[0]?.success) showStatus(`✅ Import réussi : ${fileName}`, "success");
        else showStatus("❌ Erreur de publication sur ArcGIS.", "error");
    }

    function showStatus(html, type) { statusBox.innerHTML = html; statusBox.className = "status-box status-" + type; statusBox.style.display = "block"; }
</script>
</body>
</html>
